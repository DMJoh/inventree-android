name: Build & Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build (default: master)'
        required: false
        default: 'master'
      create_release:
        description: 'Create a GitHub Release after building'
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup FVM
        id: fvm-config-action
        uses: kuhnroyal/flutter-fvm-config-action@v2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm-config-action.outputs.FLUTTER_VERSION }}
          channel: ${{ steps.fvm-config-action.outputs.FLUTTER_CHANNEL }}
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"
          cache-path: "${{ runner.tool_cache }}/flutter/:channel:-:version:-:arch:"
          pub-cache-key: "flutter-pub:os:-:channel:-:version:-:arch:-:hash:"
          pub-cache-path: "${{ runner.tool_cache }}/flutter/:channel:-:version:-:arch:"

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks

      - name: Write key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Collect translation files
        run: |
          cd lib/l10n
          python3 collect_translations.py

      - name: Install Flutter dependencies
        run: |
          dart pub global activate fvm
          fvm install
          fvm flutter pub get

      - name: Build signed release APK
        run: fvm flutter build apk --release

      - name: Get version info
        id: version
        run: |
          SEMVER=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]')
          echo "version=$SEMVER" >> $GITHUB_OUTPUT
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "release_name=InvenTree ${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=manual-$SEMVER-${{ github.run_number }}" >> $GITHUB_OUTPUT
            echo "release_name=InvenTree $SEMVER (manual build #${{ github.run_number }})" >> $GITHUB_OUTPUT
          fi

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/inventree-${{ steps.version.outputs.version }}.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: inventree-${{ steps.version.outputs.version }}-apk
          path: build/app/outputs/flutter-apk/inventree-${{ steps.version.outputs.version }}.apk
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/inventree-${{ steps.version.outputs.version }}.apk
